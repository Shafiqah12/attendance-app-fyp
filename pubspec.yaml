name: attendify
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Core
  google_fonts: ^6.2.1 
  cupertino_icons: ^1.0.8
  
  # Storage and File handling
  path_provider: ^2.1.5
  excel: ^4.0.6
  open_file: ^3.5.10
  syncfusion_flutter_xlsio: ^22.1.58

  # Location
  geolocator: ^10.1.0
  
  # NFC and Biometric
  nfc_manager: ^3.4.0
  local_auth: ^2.1.6
  flutter_secure_storage: ^9.0.0

  # QR Code
  qr_flutter: ^4.1.0        # Untuk generate QR code
  mobile_scanner: ^4.0.0    # Untuk scan QR code
  
  # Permissions
  permission_handler: ^12.0.0+1
  
  # Networking and State
  http: ^1.6.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - Dashboard_Images/
    - Student_Images/
    - Attendence_Images/