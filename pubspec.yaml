name: attendify
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Core
  google_fonts: ^6.2.1 
  cupertino_icons: ^1.0.8
  
  # Storage and File handling
  path_provider: ^2.1.5
  excel: ^4.0.6
  open_file: ^3.5.10
  syncfusion_flutter_xlsio: ^22.1.58

  geolocator: ^10.1.0
  nfc_manager: ^3.4.0
  
  # Permissions
  permission_handler: ^12.0.0+1
  
  # Networking and State
  http: ^1.6.0
  provider: ^6.1.1
  
  # REMOVED Firebase dependencies since you're not using them
  # cloud_firestore: ^5.6.7
  # firebase_database: ^11.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - Dashboard_Images/
    - Student_Images/
    - Attendence_Images/